[pytest]
addopts = --strict-markers
testpaths = tests
markers =
    unit: fast tests of isolated numerical and repository behavior
    regression: exact or tolerance-bounded legacy compatibility tests
    scientific: tests of scientific relationships and scale invariants
    gui: headless tests of the optional PySide6 application boundary
    local_data: opt-in tests requiring ICLOTS_TEST_DATA_DIR
    integration: tests spanning application, presentation, output, or GUI boundaries
    slow: tests excluded from normal development runs when introduced

